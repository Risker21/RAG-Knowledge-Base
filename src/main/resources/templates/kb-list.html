<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的知识库</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div>
    <div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div><div class="ink-particle"></div>
    <div class="app-layout">
        <header class="app-header">
            <div class="app-header-left">
                <span class="seal">墨</span>
                <h1>墨 韵 · 知识库</h1>
            </div>
            <div class="header-right">
                <span th:text="${username}"></span>
                <a href="/api/auth/logout" class="btn-logout">退出</a>
            </div>
        </header>

        <main class="main-content">
            <div class="page-header">
                <h2>我的知识库</h2>
                <button class="btn btn-accent" onclick="showCreateKb()">+ 新建知识库</button>
            </div>

            <div class="kb-grid" th:if="${!#lists.isEmpty(kbList)}">
                <div class="kb-card" th:each="kb : ${kbList}">
                    <h3 th:text="${kb.name}">知识库名称</h3>
                    <p class="kb-desc" th:text="${kb.description ?: '暂无描述'}">描述</p>
                    <p class="kb-time" th:text="${#temporals.format(kb.createdAt, 'yyyy-MM-dd HH:mm')}">时间</p>
                    <div class="kb-actions">
                        <a th:href="@{/chat/{id}(id=${kb.id})}" class="btn btn-sm btn-primary">开始问答</a>
                        <a th:href="@{/kb/{id}(id=${kb.id})}" class="btn btn-sm btn-ghost">管理文档</a>
                        <button class="btn btn-sm btn-danger" th:onclick="'deleteKb(' + ${kb.id} + ')'">删除</button>
                    </div>
                </div>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(kbList)}">
                <p>还没有知识库</p>
                <p style="margin-top:8px;font-size:13px;color:var(--ink-pale)">点击上方「新建知识库」开始</p>
            </div>
        </main>
    </div>

    <!-- 新建知识库弹窗 -->
    <div id="createModal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建知识库</h3>
                <button class="modal-close" onclick="hideModal()">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">知识库名称</label>
                <input class="form-input" type="text" id="kbName" placeholder="为你的知识库起个名字" required>
            </div>
            <div class="form-group">
                <label class="form-label">描述</label>
                <textarea class="form-input" id="kbDesc" placeholder="描述知识库的用途（可选）" rows="3"></textarea>
            </div>
            <div id="createError" class="error-msg" style="display:none"></div>
            <div class="modal-actions" style="display:flex;gap:10px;margin-top:16px">
                <button class="btn btn-primary" onclick="createKb()">创建</button>
                <button class="btn btn-ghost" onclick="hideModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        function showCreateKb() {
            document.getElementById('createModal').style.display = 'flex';
            document.getElementById('kbName').value = '';
            document.getElementById('kbDesc').value = '';
            document.getElementById('createError').style.display = 'none';
        }

        function hideModal() {
            document.getElementById('createModal').style.display = 'none';
        }

        async function createKb() {
            const name = document.getElementById('kbName').value;
            const desc = document.getElementById('kbDesc').value;
            const errorEl = document.getElementById('createError');
            if (!name) { errorEl.textContent = '请输入名称'; errorEl.style.display = 'block'; return; }

            const resp = await fetch('/kb/api/create?name=' + encodeURIComponent(name) + '&description=' + encodeURIComponent(desc), {method: 'POST'});
            const data = await resp.json();
            if (data.code === 200) {
                window.location.reload();
            } else {
                errorEl.textContent = data.message;
                errorEl.style.display = 'block';
            }
        }

        async function deleteKb(id) {
            if (!confirm('确定删除此知识库及其中所有文档和对话记录？')) return;
            const resp = await fetch('/kb/api/' + id, {method: 'DELETE'});
            const data = await resp.json();
            if (data.code === 200) {
                window.location.reload();
            } else {
                alert('删除失败: ' + (data.message || '未知错误'));
            }
        }
    </script>
    <div class="mountain-scene" aria-hidden="true">
        <svg viewBox="0 0 1440 200" preserveAspectRatio="xMidYMax meet">
            <path d="M0,200 L0,140 Q80,100 160,120 Q240,140 320,90 Q400,40 480,80 Q560,120 640,50 Q720,-10 800,30 Q880,70 960,60 Q1040,50 1120,80 Q1200,110 1280,70 Q1360,30 1440,80 L1440,200 Z" fill="currentColor"/>
            <path d="M0,200 L0,160 Q120,130 240,145 Q360,160 480,110 Q600,60 720,95 Q840,130 960,85 Q1080,40 1200,75 Q1320,110 1440,95 L1440,200 Z" fill="currentColor" opacity="0.5"/>
            <path d="M0,200 L0,180 Q180,155 360,165 Q540,175 720,140 Q900,105 1080,130 Q1260,155 1440,140 L1440,200 Z" fill="currentColor" opacity="0.25"/>
        </svg>
    </div>
</body>
</html>
